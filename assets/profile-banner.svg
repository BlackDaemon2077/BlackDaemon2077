<svg width="1600" height="260" viewBox="0 0 1600 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bannerBg" x1="0" y1="0" x2="1600" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050505"/>
      <stop offset="0.55" stop-color="#140202"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.4"/>
    </linearGradient>
    <filter id="titleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="260" rx="28" fill="url(#bannerBg)"/>
  <rect x="18" y="18" width="1564" height="224" rx="20" stroke="#2B0B0B" stroke-width="2"/>

  <g opacity="0.44">
    <path d="M52 60H490" stroke="#471010" stroke-width="2"/>
    <path d="M1010 60H1546" stroke="#471010" stroke-width="2"/>
    <path d="M52 200H410" stroke="#471010" stroke-width="2"/>
    <path d="M1200 200H1546" stroke="#471010" stroke-width="2"/>
    <path d="M1020 100H1510" stroke="#2F0A0A" stroke-width="1.5" stroke-dasharray="8 8"/>
    <path d="M1020 130H1472" stroke="#2F0A0A" stroke-width="1.5" stroke-dasharray="8 8"/>
    <path d="M1020 160H1520" stroke="#2F0A0A" stroke-width="1.5" stroke-dasharray="8 8"/>
  </g>

  <g transform="translate(54 30)" filter="url(#logoShadow)">
    <rect x="0" y="0" width="360" height="200" rx="18" fill="#0B0B0B" fill-opacity="0.28" stroke="#311010" stroke-width="2"/>
    <image href="logo-sentinel-biotech.png" x="20" y="14" width="320" height="172" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g transform="translate(500 82)" filter="url(#titleGlow)">
    <text x="0" y="78" fill="#F5F5F5" font-family="'Segoe UI Black', Arial, sans-serif" font-size="92" letter-spacing="8">BLACKDEMON2077</text>
  </g>
</svg>
